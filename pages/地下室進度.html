        "detail":  "第一層支撐及構台拆除",
        "start":  "2025-10-08",
        "end":  "2025-10-11",
        "days":  4,
        "note":  ""
    },
    {
        "main":  "B1F版面",
        "detail":  "預壘樁出界清理/帆布/清板",
        "start":  "2025-10-12",
        "end":  "2025-10-13",
        "days":  1,
        "note":  ""
    },
    {
        "main":  "B1F版面",
        "detail":  "B1F續接分料/綁紮",
        "start":  "2025-10-14",
        "end":  "2025-10-17",
        "days":  3,
        "note":  "柱牆配管/管洗洞配管"
    },
    {
        "main":  "B1F版面",
        "detail":  "B1F半牆組模/水電配管/車道組模",
        "start":  "2025-10-18",
        "end":  "2025-10-22",
        "days":  5,
        "note":  "柱牆配管"
    },
    {
        "main":  "B1F版面",
        "detail":  "B1F車道灌漿/鋼筋進料",
        "start":  "2025-10-21",
        "end":  "2025-10-22",
        "days":  1,
        "note":  "50米/水電放樣"
    },
    {
        "main":  "1F",
        "detail":  "B1F梁模板組立/         半牆澆置(10/29)",
        "start":  "2025-10-23",
        "end":  "2025-10-30",
        "days":  8,
        "note":  "300米/水電放樣"
    },
    {
        "main":  "1F",
        "detail":  "B1F梁吊料/綁紮/水電配管",
        "start":  "2025-10-30",
        "end":  "2025-11-08",
        "days":  8,
        "note":  "水電配管"
    }
];
    const reportDate = new Date("2026-06-01T00:00:00+08:00");
    const phaseOrder = ["基礎工程 含土方挖運棄", "大底到B4FL", "B4FL牆面", "B3FL版面", "B2FL版面", "B1F版面", "1F"];
    const phaseLabels = { "1F": "B1F梁板收尾" };
    function parseDate(value) { return new Date(`${value}T00:00:00+08:00`); }
    function formatDate(value) { return value.replaceAll("-", "/"); }
    function dayDiff(a,b) { return Math.round((parseDate(b) - parseDate(a)) / 86400000); }
    function typeOf(task) {
      const text = `${task.detail} ${task.note}`;
      if (/水電|配管|放樣|連通管|臨時水|照明|查驗|洗洞/.test(text)) return "water";
      if (/灌漿|澆置|支撐|土方|擋土|筏基|地樑|模板|鋼筋/.test(text)) return "major";
      return "normal";
    }
    function typeLabel(type) { return type === "water" ? "水電配合" : type === "major" ? "結構主線" : "一般"; }
    function filteredTasks() {
      const keyword = document.querySelector("#search").value.trim().toLowerCase();
      const phase = document.querySelector("#phaseFilter").value;
      return tasks.filter(task => {
        const text = `${task.main} ${task.detail} ${task.note}`.toLowerCase();
        return (phase === "all" || task.main === phase) && (!keyword || text.includes(keyword));
      });
    }
    function renderSummary() {
      const start = tasks.slice().sort((a,b) => parseDate(a.start) - parseDate(b.start))[0];
      const end = tasks.slice().sort((a,b) => parseDate(b.end) - parseDate(a.end))[0];
      const waterCount = tasks.filter(task => typeOf(task) === "water").length;
      const pourCount = tasks.filter(task => /灌漿|澆置/.test(task.detail)).length;
      const summary = [
        { label:"進度期間", value:`${formatDate(start.start)} - ${formatDate(end.end)}`, hint:"地下室與大底相關節點" },
        { label:"地下室項目", value:`${tasks.length} 筆`, hint:"由灌漿排程抽出" },
        { label:"水電配合", value:`${waterCount} 筆`, hint:"含配管、放樣、臨水電、查驗" },
        { label:"灌漿/澆置", value:`${pourCount} 筆`, hint:"含版面、半牆、車道、水箱" }
      ];
      document.querySelector("#summary").innerHTML = summary.map(item => `<div class="metric"><small>${item.label}</small><strong>${item.value}</strong><span>${item.hint}</span></div>`).join("");
    }
    function renderPhaseFilter() {
      const phases = [...new Set(tasks.map(task => task.main))];
      phases.sort((a,b) => phaseOrder.indexOf(a) - phaseOrder.indexOf(b));
      document.querySelector("#phaseFilter").innerHTML += phases.map(phase => `<option value="${phase}">${phaseLabels[phase] || phase}</option>`).join("");
    }
    function renderPhaseGrid() {
      const phases = [...new Set(tasks.map(task => task.main))];
      phases.sort((a,b) => phaseOrder.indexOf(a) - phaseOrder.indexOf(b));
      document.querySelector("#phaseGrid").innerHTML = phases.map(phase => {
        const list = tasks.filter(task => task.main === phase);
        const start = list.slice().sort((a,b) => parseDate(a.start) - parseDate(b.start))[0];
        const end = list.slice().sort((a,b) => parseDate(b.end) - parseDate(a.end))[0];
        const water = list.filter(task => typeOf(task) === "water").length;
        return `<div class="phase"><strong>${phaseLabels[phase] || phase}</strong><span>${formatDate(start.start)} - ${formatDate(end.end)}</span><span>${list.length} 筆；水電配合 ${water} 筆</span></div>`;
      }).join("");
    }
    function renderTimeline(list) {
      const from = "2024-06-01";
      const to = "2025-11-15";
      const total = Math.max(dayDiff(from, to), 1);
      document.querySelector("#timeline").innerHTML = list.map(task => {
        const startOffset = Math.max(0, dayDiff(from, task.start));
        const endOffset = Math.min(total, dayDiff(from, task.end));
        const left = Math.max(0, Math.min(100, startOffset / total * 100));
        const width = Math.max(1.2, (endOffset - startOffset + 1) / total * 100);
        const type = typeOf(task);
        return `<div class="time-row"><div class="task-name">${task.main}｜${task.detail}</div><div class="bar-track"><div class="bar ${type}" style="left:${left}%;width:${width}%"></div></div><div class="task-date">${formatDate(task.start)}<br>${formatDate(task.end)}</div></div>`;
      }).join("");
    }
    function renderTable() {
      const rows = filteredTasks();
      document.querySelector("#rowCount").textContent = `目前顯示 ${rows.length} 筆`;
      document.querySelector("#scheduleBody").innerHTML = rows.map(task => {
        const type = typeOf(task);
        return `<tr><td><span class="tag ${type}">${typeLabel(type)}</span></td><td>${phaseLabels[task.main] || task.main}</td><td><strong>${task.detail}</strong></td><td>${formatDate(task.start)}</td><td>${formatDate(task.end)}</td><td>${task.days} 天</td><td>${task.note || ""}</td></tr>`;
      }).join("");
      renderTimeline(rows);
    }
    document.querySelector("#search").addEventListener("input", renderTable);
    document.querySelector("#phaseFilter").addEventListener("change", renderTable);
    document.querySelector("#reset").addEventListener("click", () => { document.querySelector("#search").value = ""; document.querySelector("#phaseFilter").value = "all"; renderTable(); });
    renderSummary();
    renderPhaseFilter();
    renderPhaseGrid();
    renderTable();
  </script>
</body>
</html>
