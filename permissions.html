<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>權限規劃</title><link rel="stylesheet" href="assets/styles.css"></head><body><header><div class="wrap top"><span class="version">VER_20260609_V5</span><h1>權限規劃</h1><nav><a href="index.html">主頁</a><a href="desktop.html">電腦瀏覽</a><a href="mobile.html">手機瀏覽</a></nav></div></header><main class="wrap"><div class="notice">GitHub Pages 網頁本身不提供登入式權限。測試版先用「知道網址可看、不能改」。協作修改權限建議放在 GitHub repo 權限控管。</div><section class="doc-grid"><div class="doc-link"><span>Admin</span><strong>主權限：管理 repo、Pages、協作者、版本發佈。</strong></div><div class="doc-link"><span>Team</span><strong>協作小組：可依分工給 Write 或 Maintain，修改後由版本紀錄追蹤。</strong></div><div class="doc-link"><span>Limited</span><strong>部分權限：可使用 Pull Request 或指定資料夾流程，避免直接改正式版。</strong></div><div class="doc-link"><span>Viewer</span><strong>只能觀看：看 GitHub Pages 網址，不給 repo 寫入權限。</strong></div></section></main></body></html>
